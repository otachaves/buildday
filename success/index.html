<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>You're in — BuildDay</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230066FF'/><text y='.9em' font-size='72' x='12' fill='white' font-family='system-ui' font-weight='900'>B</text></svg>"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#F7F8FC;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
.card{background:#fff;border-radius:20px;padding:3rem 2.5rem;max-width:480px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,102,255,.1);border:1px solid #DDE2F0;}
.logo{font-weight:900;font-size:1.3rem;letter-spacing:-.5px;color:#0A0E1A;margin-bottom:2rem;}
.logo span{color:#0066FF;}
.check{width:64px;height:64px;background:rgba(0,102,255,.08);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:1.8rem;}
h1{font-size:1.6rem;font-weight:900;letter-spacing:-.5px;margin-bottom:.5rem;color:#0A0E1A;}
.subtitle{color:#5A6180;font-size:.95rem;margin-bottom:2rem;line-height:1.6;}
.details{background:#F7F8FC;border-radius:12px;padding:1.25rem;margin-bottom:2rem;text-align:left;display:flex;flex-direction:column;gap:.75rem;}
.detail-row{display:flex;align-items:flex-start;gap:.75rem;font-size:.88rem;color:#5A6180;}
.detail-row strong{color:#0A0E1A;}
.btn{display:inline-block;background:#0066FF;color:#fff;font-weight:800;padding:.85rem 2rem;border-radius:10px;font-size:.95rem;text-decoration:none;transition:.2s;}
.btn:hover{background:#0052cc;}
.note{font-size:.78rem;color:#5A6180;margin-top:1rem;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Build<span>Day</span></div>
  <div class="check">🎉</div>
  <h1>You're in!</h1>
  <p class="subtitle">Your spot at BuildDay is confirmed.<br>Check your email for a confirmation.</p>
  <div class="details">
    <div class="detail-row"><span>📅</span><span><strong>Date:</strong> June 6, 2026</span></div>
    <div class="detail-row"><span>📍</span><span><strong>Venue:</strong> Segal Building — SFU Vancouver<br>500 Granville St, Vancouver, BC V6C 1W6</span></div>
    <div class="detail-row"><span>⏰</span><span><strong>Doors open:</strong> 8:00 AM</span></div>
  </div>
  <a href="/" class="btn">Back to BuildDay →</a>
  <p class="note">Questions? Email us at <a href="mailto:communitymanager@archipelagoaec.com" style="color:#0066FF;">communitymanager@archipelagoaec.com</a></p>
</div>
</body>
</html>
